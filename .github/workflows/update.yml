name: refresh tennispredict data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run refresh (Indian Wells WS 2026)
        env:
          START_MMDD: "0304"
          TZ_NAME: "Asia/Shanghai"
        run: |
          python -u refresh_tennispredict.py

      - name: Heartbeat latest.json (always update)
        run: |
          python - <<'PY'
          import json, time, os
          p = os.path.join("docs","data","latest.json")
          with open(p, "r", encoding="utf-8") as f:
            j = json.load(f)
          j["heartbeat"] = int(time.time())
          with open(p, "w", encoding="utf-8") as f:
            json.dump(j, f, ensure_ascii=False, indent=2)
          print("heartbeat updated:", j["heartbeat"])
          PY

      - name: Commit & push (always)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json docs/data/manifest.json 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto heartbeat (latest.json)"
            git push
          else
            echo "No changes to commit."
          fi
